<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nanomight AI — Call Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* ── DARK (default) ── */
body.dark {
  --bg: #080c14;
  --bg2: #0d1220;
  --surface: rgba(255,255,255,0.05);
  --surface-hov: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.5);
  --text3: rgba(255,255,255,0.28);
  --accent: #0A84FF;
  --accent-dim: rgba(10,132,255,0.15);
  --sidebar-bg: rgba(255,255,255,0.04);
  --topbar-bg: rgba(8,12,20,0.85);
  --card-shadow: 0 2px 24px rgba(0,0,0,0.4);
  --row-hov: rgba(255,255,255,0.04);
  --scrub: rgba(255,255,255,0.06);
}

/* ── LIGHT ── */
body.light {
  --bg: #f0f3f8;
  --bg2: #e4e9f2;
  --surface: rgba(255,255,255,0.7);
  --surface-hov: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.07);
  --border-strong: rgba(0,0,0,0.12);
  --text: rgba(0,0,0,0.88);
  --text2: rgba(0,0,0,0.45);
  --text3: rgba(0,0,0,0.25);
  --accent: #0A84FF;
  --accent-dim: rgba(10,132,255,0.1);
  --sidebar-bg: rgba(255,255,255,0.6);
  --topbar-bg: rgba(240,243,248,0.88);
  --card-shadow: 0 2px 16px rgba(0,0,0,0.08);
  --row-hov: rgba(0,0,0,0.025);
  --scrub: rgba(0,0,0,0.05);
}

body { background: var(--bg); color: var(--text); }

/* BLOBS */
.blob-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(100px); animation: bdrift 14s ease-in-out infinite alternate; }
body.dark .blob1 { width:600px;height:600px;background:rgba(10,132,255,0.12);top:-200px;left:-100px; }
body.dark .blob2 { width:400px;height:400px;background:rgba(94,92,230,0.1);bottom:-100px;right:-100px;animation-delay:-6s; }
body.light .blob1 { width:600px;height:600px;background:rgba(10,132,255,0.06);top:-200px;left:-100px; }
body.light .blob2 { width:400px;height:400px;background:rgba(94,92,230,0.05);bottom:-100px;right:-100px;animation-delay:-6s; }
@keyframes bdrift { 0%{transform:translate(0,0)} 100%{transform:translate(50px,40px)} }

/* LAYOUT */
.app { display:flex; min-height:100vh; position:relative; z-index:1; }

/* SIDEBAR */
.sidebar {
  width: 230px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 28px 22px 24px;
  border-bottom: 1px solid var(--border);
}

.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #0A84FF, #5E5CE6);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(10,132,255,0.35);
}

.logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }
.logo-name span { color: #0A84FF; }

.sidebar-section { padding: 16px 12px 8px; }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 10px 8px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text2);
  transition: all 0.18s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--surface-hov); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item svg { flex-shrink: 0; opacity: 0.8; }
.nav-item.active svg { opacity: 1; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.18s;
}
.user-chip:hover { background: var(--surface-hov); }
.avatar {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #0A84FF, #5E5CE6);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text3); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 60px;
  background: var(--topbar-bg);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-left { display: flex; align-items: center; gap: 12px; }
.page-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.record-count {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-weight: 500;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 36px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.18s;
}
.icon-btn:hover { background: var(--surface-hov); color: var(--text); }

.export-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.18s;
  box-shadow: 0 4px 16px rgba(10,132,255,0.3);
}
.export-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* CONTENT */
.content { padding: 24px 28px; flex: 1; }

/* METRICS ROW */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}

.metric-card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  transition: all 0.2s;
  box-shadow: var(--card-shadow);
}
.metric-card:hover { background: var(--surface-hov); transform: translateY(-1px); }

.metric-label { font-size: 11.5px; font-weight: 500; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.metric-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--text); }
.metric-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.metric-pill {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  margin-top: 6px;
}
.pill-green { background: rgba(48,209,88,0.15); color: #30D158; }
.pill-red   { background: rgba(255,69,58,0.15);  color: #FF453A; }
.pill-blue  { background: rgba(10,132,255,0.15); color: #0A84FF; }

/* ── COMMAND BAR ── */
.cmd-bar-wrap {
  margin-bottom: 14px;
}

.cmd-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 6px 8px;
  box-shadow: var(--card-shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.cmd-bar:focus-within {
  border-color: var(--border-strong);
  box-shadow: var(--card-shadow), 0 0 0 3px var(--accent-dim);
}

.cmd-segment {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  flex: 1;
  min-width: 0;
  position: relative;
}
.cmd-segment + .cmd-segment::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; height: 60%;
  width: 1px;
  background: var(--border);
}

.cmd-seg-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  white-space: nowrap;
  flex-shrink: 0;
}

.cmd-input {
  background: none;
  border: none;
  outline: none;
  font-size: 13.5px;
  color: var(--text);
  font-family: inherit;
  width: 100%;
  min-width: 0;
}
.cmd-input::placeholder { color: var(--text3); }

.cmd-date {
  background: none;
  border: none;
  outline: none;
  font-size: 13px;
  color: var(--text2);
  font-family: inherit;
  cursor: pointer;
  min-width: 110px;
}
.cmd-date::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }

.cmd-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  padding-left: 8px;
}

.cmd-pill-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 13px;
  border-radius: 10px;
  font-size: 12px; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  border: 1px solid transparent;
}
.cmd-pill-btn.ghost {
  background: var(--scrub);
  color: var(--text2);
  border-color: var(--border);
}
.cmd-pill-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
.cmd-pill-btn.solid {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px rgba(10,132,255,0.3);
}
.cmd-pill-btn.solid:hover { opacity: 0.85; }

/* ── OUTCOME STRIP ── */
.outcome-strip-wrap {
  position: relative;
  margin-bottom: 18px;
}

.outcome-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 2px 2px 6px;
}
.outcome-strip::-webkit-scrollbar { display: none; }

.os-tile {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 5px;
  padding: 12px 16px 10px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 110px;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}
.os-tile::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--tile-color, transparent);
  border-radius: 0 0 14px 14px;
  opacity: 0;
  transition: opacity 0.2s;
}
.os-tile:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.os-tile:hover::after { opacity: 0.5; }
.os-tile.active { border-color: var(--tile-color, var(--accent)); background: var(--surface-hov); }
.os-tile.active::after { opacity: 1; }

.os-num {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.8px;
  color: var(--text);
  line-height: 1;
}
.os-tile.active .os-num { color: var(--tile-color, var(--accent)); }

.os-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  white-space: nowrap;
}
.os-tile.active .os-name { color: var(--text2); }

.os-pct {
  font-size: 11px;
  font-weight: 700;
  color: var(--tile-color, var(--accent));
  opacity: 0.5;
  margin-top: 2px;
  transition: opacity 0.2s;
}
.os-tile.active .os-pct { opacity: 1; }

.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* TABLE */
.table-card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.table-title { font-size: 14px; font-weight: 600; color: var(--text); }
.table-meta { font-size: 12px; color: var(--text3); }

table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  background: var(--scrub);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th:hover { color: var(--text2); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--row-hov); }

td {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
}

.call-id { font-weight: 600; color: var(--accent); font-size: 12.5px; }
.phone { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12.5px; color: var(--text2); }
.list-id { font-size: 12px; color: var(--text3); font-weight: 500; }
.timestamp { font-size: 12px; color: var(--text2); }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-user-silent  { background: rgba(255,69,58,0.14);  color: #FF453A; }
.badge-qualified    { background: rgba(48,209,88,0.14);  color: #30D158; }
.badge-dair         { background: rgba(255,159,10,0.14); color: #FF9F0A; }
.badge-callback     { background: rgba(10,132,255,0.14); color: #0A84FF; }
.badge-dnc          { background: rgba(255,55,95,0.14);  color: #FF375F; }
.badge-dnq          { background: rgba(142,142,147,0.14);color: #8E8E93; }
.badge-answering    { background: rgba(94,92,230,0.14);  color: #5E5CE6; }
.badge-neutral      { background: rgba(142,142,147,0.14);color: #8E8E93; }
.badge-honeypot     { background: rgba(255,214,10,0.14); color: #c49d00; }
.badge-default      { background: rgba(142,142,147,0.12);color: #8E8E93; }

/* TRANSCRIPT BTN */
.transcript-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: var(--scrub);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
}
.transcript-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}
.page-info { font-size: 12px; color: var(--text3); }
.page-btns { display: flex; gap: 6px; }
.page-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--scrub);
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border-strong);
  border-radius: 22px;
  width: 560px;
  max-width: 90vw;
  max-height: 80vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: modalUp 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
@keyframes modalUp { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:none; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); transition: all 0.18s;
}
.modal-close:hover { background: var(--surface-hov); color: var(--text); }
.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.transcript-text {
  font-size: 13.5px; line-height: 1.75;
  color: var(--text2);
  white-space: pre-wrap;
}
.transcript-line { margin-bottom: 12px; }
.speaker { font-weight: 700; color: var(--text); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* TWEAK PANEL */
.tweak-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 280px;
  background: var(--surface);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border-strong);
  border-radius: 18px;
  padding: 18px;
  z-index: 100;
  box-shadow: var(--card-shadow);
  display: none;
}
.tweak-panel.open { display: block; animation: modalUp 0.25s cubic-bezier(0.16,1,0.3,1); }
.tweak-panel-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.tweak-row { margin-bottom: 12px; }
.tweak-row label { font-size: 11px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.tweak-select {
  width: 100%;
  padding: 8px 10px;
  background: var(--scrub);
  border: 1px solid var(--border);
  border-radius: 9px;
  font-size: 13px; font-family: inherit;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
</style>
</head>
<body class="dark" id="app-root">

<div class="blob-wrap">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
</div>

<div id="react-root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DATA ───────────────────────────────────────────────
const OUTCOMES = [
  { key:'all',       label:'All Calls',        count:3979, color:'#0A84FF',  pct:100 },
  { key:'silent',    label:'User Silent',       count:1422, color:'#FF453A',  pct:36  },
  { key:'qualified', label:'Qualified',         count:1166, color:'#30D158',  pct:29  },
  { key:'dair',      label:'DAIR',              count:280,  color:'#FF9F0A',  pct:7   },
  { key:'answering', label:'Answering Machine',  count:207,  color:'#5E5CE6',  pct:5   },
  { key:'dnq',       label:'DNQ',               count:190,  color:'#8E8E93',  pct:5   },
  { key:'hangup',    label:'User Hangup',        count:393,  color:'#FF375F',  pct:10  },
  { key:'dnc',       label:'DNC',               count:44,   color:'#FF453A',  pct:1   },
  { key:'callback',  label:'Call Back',          count:9,    color:'#0A84FF',  pct:0   },
  { key:'honeypot',  label:'Honeypot',           count:100,  color:'#c49d00',  pct:3   },
  { key:'neutral',   label:'Neutral',            count:35,   color:'#8E8E93',  pct:1   },
  { key:'unclear',   label:'Unclear Response',   count:190,  color:'#8E8E93',  pct:5   },
];

const BADGE_CLASS = {
  'User Silent':      'badge-user-silent',
  'Qualified':        'badge-qualified',
  'DAIR':             'badge-dair',
  'Call Back':        'badge-callback',
  'DNC':              'badge-dnc',
  'DNQ':              'badge-dnq',
  'Answering Machine':'badge-answering',
  'Neutral':          'badge-neutral',
  'Honeypot':         'badge-honeypot',
  'User Hangup':      'badge-user-silent',
  'Unclear Response': 'badge-neutral',
};

function genRows(n) {
  const cats = ['User Silent','Qualified','DAIR','Call Back','DNC','DNQ','Answering Machine','Neutral','User Hangup','Honeypot'];
  const lists = ['21042026','12042026','10042026','09042026'];
  const rows = [];
  for (let i=0;i<n;i++) {
    const id = 15698651 - i;
    const min = 22 - Math.floor(i/5);
    const sec = 59 - (i%60);
    rows.push({
      id,
      phone: `+${Math.floor(1000000000 + Math.random()*9000000000)}`,
      listId: lists[i%lists.length],
      category: cats[i%cats.length],
      timestamp: `04/21/2026, 14:${String(min).padStart(2,'0')}:${String(sec<0?0:sec).padStart(2,'0')}`,
      hasTranscript: Math.random() > 0.3,
    });
  }
  return rows;
}

const ALL_ROWS = genRows(120);

const TRANSCRIPT_SAMPLES = [
  `AI Agent: Hello, am I speaking with the homeowner?\nContact: Yes, who is this?\nAI Agent: Great! This is Alex calling from Astro BPO. I'm reaching out about a special home improvement offer in your area. Do you have a moment?\nContact: What kind of offer?\nAI Agent: We're currently offering free consultations for solar panel installations in your neighborhood. Many homeowners are saving up to 40% on their energy bills. Would you be interested in learning more?\nContact: Maybe. Can you send me some information?\nAI Agent: Absolutely! I'll have one of our specialists follow up with you. What's the best time to reach you?`,
  `AI Agent: Hi there, is this the right number for the property on Elm Street?\nContact: [silence]\nAI Agent: Hello? Can you hear me?\nContact: [silence]\nAI Agent: I'll try reaching you again later. Have a great day!`,
  `AI Agent: Good afternoon! I'm calling about your recent inquiry regarding home refinancing. Is this a good time?\nContact: I didn't inquire about anything.\nAI Agent: I apologize for any confusion. We do have your information on our list — would you prefer to be removed?\nContact: Yes please.\nAI Agent: Done! I've noted your preference. You won't hear from us again. Have a wonderful day!`,
];

// ─── ICONS ──────────────────────────────────────────────
const Icon = ({ d, size=16, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
    <path d={d}/>
  </svg>
);

// ─── BADGE ──────────────────────────────────────────────
function Badge({ label }) {
  const cls = BADGE_CLASS[label] || 'badge-default';
  return <span className={`badge ${cls}`}>{label}</span>;
}

// ─── METRIC CARD ────────────────────────────────────────
function MetricCard({ label, value, sub, pill, pillType }) {
  return (
    <div className="metric-card">
      <div className="metric-label">{label}</div>
      <div className="metric-val">{value}</div>
      {sub && <div className="metric-sub">{sub}</div>}
      {pill && <span className={`metric-pill pill-${pillType}`}>{pill}</span>}
    </div>
  );
}

// ─── OUTCOME TILE ───────────────────────────────────────
function OutcomeChip({ o, active, onClick }) {
  return (
    <div
      className={`os-tile${active?' active':''}`}
      style={{'--tile-color': o.color}}
      onClick={onClick}
    >
      <div className="os-num">{o.count >= 1000 ? (o.count/1000).toFixed(1)+'k' : o.count}</div>
      <div className="os-name">{o.label}</div>
      <div className="os-pct">{o.pct}%</div>
    </div>
  );
}

// ─── TRANSCRIPT MODAL ───────────────────────────────────
function TranscriptModal({ row, onClose }) {
  const text = TRANSCRIPT_SAMPLES[row.id % TRANSCRIPT_SAMPLES.length];
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">
            Transcript — {row.phone}
            <span style={{marginLeft:10,fontSize:12,color:'var(--text3)',fontWeight:400}}>{row.timestamp}</span>
          </div>
          <button className="modal-close" onClick={onClose}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div className="modal-body">
          {text.split('\n').map((line, i) => {
            const [speaker, ...rest] = line.split(':');
            return (
              <div key={i} className="transcript-line">
                <span className="speaker">{speaker}:</span>
                <span className="transcript-text"> {rest.join(':')}</span>
              </div>
            );
          })}
          <div style={{marginTop:20,padding:'12px 14px',background:'var(--scrub)',borderRadius:10,border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Response Category</div>
            <Badge label={row.category}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('fa_theme')||'dark');
  const [activeOutcome, setActiveOutcome] = useState('all');
  const [search, setSearch] = useState('');
  const [listSearch, setListSearch] = useState('');
  const [date, setDate] = useState('2026-04-21');
  const [page, setPage] = useState(1);
  const [sortCol, setSortCol] = useState('id');
  const [sortDir, setSortDir] = useState('desc');
  const [transcriptRow, setTranscriptRow] = useState(null);
  const [tweakOpen, setTweakOpen] = useState(false);
  const [density, setDensity] = useState('normal');
  const [accentColor, setAccentColor] = useState('#0A84FF');
  const PER_PAGE = density==='compact' ? 20 : 12;

  useEffect(() => {
    document.getElementById('app-root').className = theme;
    localStorage.setItem('fa_theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', accentColor);
    document.documentElement.style.setProperty('--accent-dim', accentColor+'26');
  }, [accentColor]);

  // Tweaks panel toggle
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const filtered = ALL_ROWS.filter(r => {
    const matchOutcome = activeOutcome==='all' || r.category.toLowerCase().replace(/ /g,'').includes(activeOutcome.replace(/ /g,''));
    const matchSearch = !search || r.phone.includes(search) || r.category.toLowerCase().includes(search.toLowerCase()) || String(r.id).includes(search);
    const matchList = !listSearch || r.listId.includes(listSearch);
    return matchOutcome && matchSearch && matchList;
  });

  const sorted = [...filtered].sort((a,b) => {
    let v = sortCol==='id' ? a.id-b.id : sortCol==='phone' ? a.phone.localeCompare(b.phone) : a.category.localeCompare(b.category);
    return sortDir==='asc' ? v : -v;
  });

  const total = sorted.length;
  const pages = Math.max(1, Math.ceil(total/PER_PAGE));
  const curPage = Math.min(page, pages);
  const rows = sorted.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);

  function handleSort(col) {
    if (sortCol===col) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir('desc'); }
    setPage(1);
  }

  const sortArrow = col => sortCol===col ? (sortDir==='asc'?'↑':'↓') : '';

  const NAV = [
    { key:'stats',      label:'Statistics',   icon:'M18 20V10M12 20V4M6 20v-6' },
    { key:'reports',    label:'Reports',      icon:'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z' },
    { key:'recordings', label:'Recordings',   icon:'M3 18v-6a9 9 0 0118 0v6M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z' },
    { key:'export',     label:'Data Export',  icon:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3' },
  ];

  return (
    <div className="app">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 01.11 2.38 2 2 0 012.11.2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.28-1.35a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div className="logo-name">Nanomight <span>AI</span></div>
        </div>

        <div className="sidebar-section">
          <div className="sidebar-label">Navigation</div>
          {NAV.map(n => (
            <div key={n.key} className={`nav-item${n.key==='reports'?' active':''}`}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d={n.icon}/>
              </svg>
              {n.label}
            </div>
          ))}
        </div>

        <div className="sidebar-section" style={{marginTop:8}}>
          <div className="sidebar-label">Account</div>
          <div className="nav-item">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Client View
          </div>
          <div className="nav-item" style={{color:'var(--text3)'}} onClick={() => window.location.href='Login.html'}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Logout
          </div>
        </div>

        <div className="sidebar-footer">
          <div className="user-chip">
            <div className="avatar">AB</div>
            <div className="user-info">
              <div className="user-name">Astro Bpo</div>
              <div className="user-role">Extension: 11</div>
            </div>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <div className="main">
        {/* TOPBAR */}
        <div className="topbar">
          <div className="topbar-left">
            <span className="page-title">Call Reports</span>
            <span className="record-count">{total.toLocaleString()} records</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>US Eastern Time (EST/EDT)</span>
          </div>
          <div className="topbar-right">
            {/* theme toggle */}
            <button className="icon-btn" onClick={() => setTheme(t => t==='dark'?'light':'dark')} title="Toggle theme">
              {theme==='dark'
                ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
              }
            </button>
            <button className="icon-btn" title="Notifications">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
            </button>
            <button className="export-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              Export CSV
            </button>
          </div>
        </div>

        <div className="content">
          {/* METRICS */}
          <div className="metrics-row">
            <MetricCard label="Total Calls" value="3,979" sub="Today · All lists" pill="+12.4%" pillType="green"/>
            <MetricCard label="Qualified" value="1,166" sub="29% of total" pill="29%" pillType="blue"/>
            <MetricCard label="Dropped Calls" value="2,602" sub="65% of total" pill="65%" pillType="red"/>
            <MetricCard label="A Grade Transfers" value="1,166" sub="29% conversion" pill="+3.1%" pillType="green"/>
          </div>

          {/* COMMAND BAR */}
          <div className="cmd-bar-wrap">
            <div className="cmd-bar">
              {/* Search segment */}
              <div className="cmd-segment" style={{flex:2}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--text3)',flexShrink:0}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input className="cmd-input" placeholder="Search phone number, call ID, category…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
              </div>
              {/* List ID segment */}
              <div className="cmd-segment" style={{flex:1}}>
                <span className="cmd-seg-label">List</span>
                <input className="cmd-input" placeholder="Any list ID…" value={listSearch} onChange={e=>{setListSearch(e.target.value);setPage(1);}}/>
              </div>
              {/* Date segment */}
              <div className="cmd-segment" style={{flexShrink:0}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--text3)',flexShrink:0}}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <input type="date" className="cmd-date" value={date} onChange={e=>setDate(e.target.value)}/>
              </div>
              {/* Actions */}
              <div className="cmd-actions">
                <button className="cmd-pill-btn ghost" onClick={()=>{setSearch('');setListSearch('');setDate('2026-04-21');setActiveOutcome('all');setPage(1);}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                  Reset
                </button>
              </div>
            </div>
          </div>

          {/* OUTCOME STRIP */}
          <div className="outcome-strip-wrap">
            <div className="outcome-strip">
              {OUTCOMES.map(o => (
                <OutcomeChip key={o.key} o={o} active={activeOutcome===o.key} onClick={()=>{setActiveOutcome(o.key);setPage(1);}}/>
              ))}
            </div>
          </div>

          {/* TABLE */}
          <div className="table-card">
            <div className="table-header">
              <div className="table-title">Call Records</div>
              <div className="table-meta">Showing {((curPage-1)*PER_PAGE)+1}–{Math.min(curPage*PER_PAGE,total)} of {total.toLocaleString()}</div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table>
                <thead>
                  <tr>
                    <th onClick={()=>handleSort('id')}># {sortArrow('id')}</th>
                    <th onClick={()=>handleSort('phone')}>Phone No {sortArrow('phone')}</th>
                    <th>List ID</th>
                    <th onClick={()=>handleSort('category')}>Response Category {sortArrow('category')}</th>
                    <th>Timestamp (EST/EDT)</th>
                    <th>Transcript</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(r => (
                    <tr key={r.id} onClick={()=>setTranscriptRow(r)}>
                      <td><span className="call-id">{r.id}</span></td>
                      <td><span className="phone">{r.phone}</span></td>
                      <td><span className="list-id">{r.listId}</span></td>
                      <td><Badge label={r.category}/></td>
                      <td><span className="timestamp">{r.timestamp}</span></td>
                      <td>
                        <button className="transcript-btn" onClick={e=>{e.stopPropagation();setTranscriptRow(r);}}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                          {r.hasTranscript ? 'Show Transcript' : 'No Transcript'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="pagination">
              <div className="page-info">Page {curPage} of {pages}</div>
              <div className="page-btns">
                <button className="page-btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={curPage===1}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                {Array.from({length:Math.min(5,pages)},(_,i)=>{
                  const p = Math.max(1, Math.min(pages-4, curPage-2)) + i;
                  return p<=pages ? (
                    <button key={p} className={`page-btn${p===curPage?' active':''}`} onClick={()=>setPage(p)}>{p}</button>
                  ) : null;
                })}
                <button className="page-btn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={curPage===pages}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* TRANSCRIPT MODAL */}
      {transcriptRow && <TranscriptModal row={transcriptRow} onClose={()=>setTranscriptRow(null)}/>}

      {/* TWEAKS PANEL */}
      <div className={`tweak-panel${tweakOpen?' open':''}`}>
        <div className="tweak-panel-title">
          Tweaks
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontFamily:'inherit'}} onClick={()=>setTweakOpen(false)}>✕</button>
        </div>
        <div className="tweak-row">
          <label>Theme</label>
          <select className="tweak-select" value={theme} onChange={e=>setTheme(e.target.value)}>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div className="tweak-row">
          <label>Row Density</label>
          <select className="tweak-select" value={density} onChange={e=>setDensity(e.target.value)}>
            <option value="normal">Normal</option>
            <option value="compact">Compact</option>
          </select>
        </div>
        <div className="tweak-row">
          <label>Accent Color</label>
          <select className="tweak-select" value={accentColor} onChange={e=>setAccentColor(e.target.value)}>
            <option value="#0A84FF">Blue (default)</option>
            <option value="#30D158">Green</option>
            <option value="#5E5CE6">Indigo</option>
            <option value="#FF9F0A">Amber</option>
          </select>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('react-root')).render(<App/>);
</script>
</body>
</html>
